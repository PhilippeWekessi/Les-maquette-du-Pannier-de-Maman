<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — Le Panier de Maman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#2F5233; --green-leaf:#4C7A3D; --orange:#E8752D;
    --tomato:#C1442E; --cream:#FBF3E3; --kraft:#E9D9B6; --kraft-dark:#CBB27F;
    --charcoal:#2B2420; --charcoal-soft:#5A5148; --white:#fff;
    --font-display:'Baloo 2',sans-serif; --font-body:'Work Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--font-body);color:var(--charcoal);
    background:var(--cream);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  a{color:inherit;text-decoration:none;}

  .choice-card{width:100%;max-width:460px;background:#fff;border-radius:22px;box-shadow:0 16px 40px rgba(43,36,32,0.12);overflow:hidden;}
  .choice-head{background:var(--green-deep);padding:30px 30px 24px;text-align:center;color:#fff;}
  .choice-head__brand{font-family:var(--font-display);font-weight:700;font-size:1.3rem;}
  .choice-head__sub{font-size:0.85rem;color:#B7D3A8;margin-top:4px;}

  .choice-body{padding:30px;}
  .choice-body__title{font-family:var(--font-display);font-weight:700;font-size:1.15rem;color:var(--green-deep);margin-bottom:6px;text-align:center;}
  .choice-body__hint{font-size:0.88rem;color:var(--charcoal-soft);text-align:center;margin-bottom:26px;}

  .choice-option{
    display:block;
    border:1.5px solid var(--kraft-dark);border-radius:16px;padding:18px 20px;margin-bottom:14px;
    transition:border-color .15s ease,background .15s ease,transform .15s ease;
  }
  .choice-option:hover{border-color:var(--green-deep);background:#F4F8F1;transform:translateY(-2px);}

  .choice-option__title{font-weight:700;font-size:1rem;color:var(--charcoal);}
  .choice-option__desc{font-size:0.82rem;color:var(--charcoal-soft);margin-top:2px;}

  .back-link{display:block;text-align:center;font-size:0.86rem;color:var(--charcoal-soft);margin-top:14px;}
</style>
</head>
<body>

<div class="choice-card">
  <div class="choice-head">
    <div class="choice-head__brand">Le Panier de Maman</div>
    <div class="choice-head__sub">Fruits et légumes frais, livrés chez vous</div>
  </div>

  <div class="choice-body">
    <div class="choice-body__title">Créer un compte</div>
    <div class="choice-body__hint">Choisissez le type de compte qui vous correspond.</div>

    <a href="inscription-client-livreur.html" class="choice-option">
      <div class="choice-option__title">Client ou Livreur</div>
      <div class="choice-option__desc">Commander des produits, ou livrer des commandes</div>
    </a>

    <a href="inscription-vendeur.html" class="choice-option">
      <div class="choice-option__title">Vendeur / Vendeuse</div>
      <div class="choice-option__desc">Ouvrir votre boutique sur la plateforme</div>
    </a>

    <a href="connexion.html" class="back-link">← Retour à la connexion</a>
  </div>
</div>

</body>
</html>

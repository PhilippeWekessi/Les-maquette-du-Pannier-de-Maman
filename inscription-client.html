<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — Le Panier de Maman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#2F5233; --green-leaf:#4C7A3D; --orange:#E8752D;
    --tomato:#C1442E; --cream:#FBF3E3; --kraft:#E9D9B6; --kraft-dark:#CBB27F;
    --charcoal:#2B2420; --charcoal-soft:#5A5148; --white:#fff;
    --font-display:'Baloo 2',sans-serif; --font-body:'Work Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--font-body);color:var(--charcoal);
    background:var(--cream);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  button{font-family:inherit;cursor:pointer;border:none;}
  input{font-family:inherit;}
  a{color:inherit;text-decoration:none;}

  .auth-card{width:100%;max-width:420px;background:#fff;border-radius:22px;box-shadow:0 16px 40px rgba(43,36,32,0.12);overflow:hidden;}
  .auth-head{background:var(--green-deep);padding:30px 30px 24px;text-align:center;color:#fff;}
  .auth-head__brand{font-family:var(--font-display);font-weight:700;font-size:1.3rem;}
  .auth-head__sub{font-size:0.85rem;color:#B7D3A8;margin-top:4px;}

  .auth-body{padding:28px 30px 32px;}
  .auth-body__title{font-family:var(--font-display);font-weight:700;font-size:1.15rem;color:var(--green-deep);margin-bottom:18px;text-align:center;}

  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:6px;color:var(--charcoal-soft);}
  .form-group input{
    width:100%;padding:12px 14px;border:1.5px solid var(--kraft-dark);border-radius:10px;
    font-size:0.92rem;background:var(--cream);color:var(--charcoal);
  }
  .form-group input:focus{outline:2px solid var(--green-leaf);}

  .password-field{position:relative;}
  .password-field input{padding-right:44px;}
  .password-toggle{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;padding:4px;
    color:var(--charcoal-soft);display:flex;align-items:center;justify-content:center;
  }
  .password-toggle:hover{color:var(--green-deep);}
  .password-toggle svg{width:20px;height:20px;}
  .password-toggle .icon-eye-off{display:none;}
  .password-toggle.is-visible .icon-eye{display:none;}
  .password-toggle.is-visible .icon-eye-off{display:block;}

  .otp-note{
    background:var(--cream);border:1.5px dashed var(--kraft-dark);border-radius:10px;
    padding:12px 14px;font-size:0.82rem;color:var(--charcoal-soft);margin-bottom:16px;
  }

  .submit-btn{
    width:100%;background:var(--orange);color:#fff;padding:14px 0;border-radius:999px;
    font-weight:700;font-size:0.98rem;margin-top:8px;transition:transform .15s ease;
  }
  .submit-btn:hover{transform:translateY(-2px);}

  .switch-link{text-align:center;font-size:0.86rem;color:var(--charcoal-soft);margin-top:18px;}
  .switch-link a{color:var(--green-deep);font-weight:700;}
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-head">
    <div class="auth-head__brand">Le Panier de Maman</div>
    <div class="auth-head__sub">Fruits et légumes frais, livrés chez vous</div>
  </div>

  <div class="auth-body">
    <div class="auth-body__title">Créer un compte client</div>

    <div class="form-group">
      <label>Nom</label>
      <input type="text" placeholder="Votre nom">
    </div>
    <div class="form-group">
      <label>Prénom</label>
      <input type="text" placeholder="Votre prénom">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Ex : panier@gmail.com">
    </div>
    <div class="form-group">
      <label>Numéro de téléphone</label>
      <input type="tel" placeholder="Ex : 01 90 00 00 00">
    </div>

    <div class="otp-note">Un code de vérification par SMS vous sera envoyé à ce numéro pour confirmer votre identité.</div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="password-field">
        <input type="password" id="signupPassword" placeholder="Choisissez un mot de passe">
        <button type="button" class="password-toggle" data-toggle-password="signupPassword" aria-label="Afficher le mot de passe">
          <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <div class="password-field">
        <input type="password" id="signupPasswordConfirm" placeholder="Retapez le mot de passe">
        <button type="button" class="password-toggle" data-toggle-password="signupPasswordConfirm" aria-label="Afficher le mot de passe">
          <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn">Créer mon compte</button>

    <div class="switch-link">Déjà un compte ? <a href="connexion.html">Se connecter</a></div>
  </div>
</div>

<script>
  document.querySelectorAll('[data-toggle-password]').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.togglePassword);
      const isVisible = input.type === 'text';
      input.type = isVisible ? 'password' : 'text';
      btn.classList.toggle('is-visible', !isVisible);
    });
  });

  document.getElementById('submitBtn').addEventListener('click', () => {
    window.location.href = 'accueil.html';
  });
</script>

</body>
</html>
